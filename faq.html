<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الأسئلة الشائعة - السبحة المحمدية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-green: #4CAF50; --bg-black: #0a0a0a; --card-dark: #161616; }
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header-faq { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .back-btn { color: white; text-decoration: none; font-size: 1.2rem; background: #222; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .faq-item { background: var(--card-dark); padding: 15px; border-radius: 12px; border-right: 4px solid var(--main-green); margin-bottom: 15px; }
        .question { font-weight: bold; color: var(--main-green); margin-bottom: 8px; display: block; }
        .answer { color: #bbb; line-height: 1.6; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="header-faq">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-right"></i></a>
        <h2 style="margin: 0; font-size: 1.3rem;">الأسئلة الشائعة</h2>
    </div>
    <div class="faq-container">
        <div class="faq-item">
            <span class="question">كيف حالك؟</span>
            <div class="answer">بخير والحمد لله، نسأل الله أن يتقبل منا ومنكم صالح الأعمال.</div>
        </div>
    </div>
</body>
</html>
