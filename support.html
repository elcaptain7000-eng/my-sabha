<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الدعم والمقترحات - السبحة المحمدية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main-green: #4CAF50; --bg-black: #0a0a0a; --card-dark: #161616; }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-black); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* المنيو العلوي مع زر الرجوع */
        .top-bar {
            display: flex;
            align-items: center;
            background: var(--card-dark);
            border-bottom: 1px solid #222;
            height: 65px;
            position: relative;
        }

        .back-btn { 
            cursor: pointer; 
            color: white; 
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%; 
            width: 60px;  
            position: absolute;
            right: 0;    
            z-index: 10;
        }

        .back-btn i { font-size: 1.4rem; }

        .app-title { 
            flex-grow: 1; 
            text-align: center; 
            font-weight: bold; 
            color: var(--main-green);
            font-size: 1.2rem;
            width: 100%;
        }

        /* حاوية المحتوى (الأزرار والبطاقة) */
        .content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .card { 
            background: #161616; 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid #222; 
            width: 100%;
            max-width: 400px;
        }

        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            padding: 18px; 
            margin: 20px 0; 
            border-radius: 12px; 
            text-decoration: none; 
            color: white; 
            font-weight: bold; 
            font-size: 1.1rem; 
            transition: 0.3s;
        }

        .call { background: #00d4ff; }
        .whatsapp { background: #25d366; }
        
        .card p { color: #888; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn" onclick="window.location.href='index.html'; return false;">
            <i class="fas fa-arrow-right"></i>
        </a>
        <div class="app-title">المقترحات والدعم</div>
    </div>

    <div class="content">
        <div class="card">
            <p>نسعد باستقبال آرائكم لتطوير التطبيق</p>
            
            <a href="tel:01012459612" class="btn call">
                <i class="fas fa-phone-alt"></i> اتصل بنا
            </a>
            
            <a href="https://wa.me/201012459612" class="btn whatsapp">
                <i class="fab fa-whatsapp"></i> مراسلة واتساب
            </a>
        </div>
    </div>

</body>
</html>
