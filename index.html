<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>السبحة المحمدية</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-green: #4CAF50; --bg-black: #0a0a0a; --card-dark: #161616; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 10px 15px; text-align: center; background: var(--card-dark); border-bottom: 1px solid #222; }
        .mode-selector { display: flex; gap: 8px; margin-top: 8px; justify-content: center; }
        .mode-btn { flex: 1; max-width: 140px; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #222; color: #888; font-weight: bold; font-size: 0.85rem; }
        .mode-btn.active { background: var(--main-green); color: white; }

        /* خيار التواصل الصغير */
        .contact-trigger { display: block; margin-top: 10px; color: #444; font-size: 0.7rem; text-decoration: none; text-align: center; }

        .main-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .intent-area { font-size: 0.85rem; color: #00d4ff; text-align: center; padding: 0 20px; min-height: 2.5rem; font-weight: bold; }
        .current-task { font-size: 1.6rem; color: #ff9800; text-align: center; padding: 0 25px; min-height: 4rem; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }

        .counter-container { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .counter-number { font-size: 7.5rem; font-family: 'Consolas', monospace; color: var(--main-green); font-weight: bold; z-index: 2; }
        .progress-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .progress-svg circle { fill: none; stroke-width: 8; stroke: #1a1a1a; }
        .progress-svg circle.bar { stroke: var(--main-green); stroke-dasharray: 816; stroke-dashoffset: 816; transition: 0.3s; stroke-linecap: round; }

        .footer-info { font-size: 0.9rem; color: #333; font-weight: bold; margin-bottom: 20px; }

        /* منطقة الأزرار */
        .controls-area { display: flex; gap: 15px; justify-content: center; align-items: center; width: 100%; min-height: 60px; }
        .btn-circle { background: #1a1a1a; border: 1px solid #222; color: #666; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .btn-reset { color: #5e1d19; }
        .btn-minus { color: #5e5419; }

        /* قائمة التواصل */
        #contactModal { position: fixed; bottom: -100%; left: 0; width: 100%; background: #111; padding: 25px; border-radius: 20px 20px 0 0; transition: 0.4s; z-index: 1000; display: flex; justify-content: space-around; border-top: 1px solid #333; }
        #contactModal.show { bottom: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 999; }
    </style>
</head>
<body onclick="handleGlobalTap(event)">

    <div class="header">
        <div style="font-weight: bold; color: var(--main-green);">السبحة المحمدية</div>
        <div class="mode-selector">
            <button id="freeMode" class="mode-btn active" onclick="setMode('free', event)">عداد حر</button>
            <button id="wordMode" class="mode-btn" onclick="setMode('word', event)">الورد المحمدي</button>
        </div>
        <a href="#" class="contact-trigger" onclick="openMenu(event)">خيارات التواصل والدعم</a>
    </div>

    <div class="main-display">
        <div id="intent" class="intent-area"></div>
        <div id="taskTitle" class="current-task" onclick="handleTaskClick(event)"></div>

        <div class="counter-container">
            <svg class="progress-svg">
                <circle cx="140" cy="140" r="130" />
                <circle id="progressBar" class="bar" cx="140" cy="140" r="130" />
            </svg>
            <div id="mainCounter" class="counter-number">0</div>
        </div>

        <div id="progressInfo" class="footer-info"></div>

        <div class="controls-area">
            <button id="btnPrev" class="btn-circle" onclick="prevTask(event)"><i class="fas fa-chevron-right"></i></button>
            <button id="btnRes" class="btn-circle btn-reset" onclick="resetAll(event)"><i class="fas fa-undo"></i></button>
            <button id="btnMin" class="btn-circle btn-minus" onclick="decrement(event)"><i class="fas fa-minus"></i></button>
            <button id="btnNext" class="btn-circle" onclick="skipTask(event)"><i class="fas fa-chevron-left"></i></button>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeMenu()"></div>
    <div id="contactModal">
        <a href="https://wa.me/201012459612" style="text-align:center; color:white; text-decoration:none;">
            <i class="fab fa-whatsapp" style="font-size:2rem; color:#25D366;"></i><br><small>واتساب</small>
        </a>
        <a href="tel:01012459612" style="text-align:center; color:white; text-decoration:none;">
            <i class="fas fa-phone-alt" style="font-size:2rem; color:#00d4ff;"></i><br><small>اتصال</small>
        </a>
        <a href="https://wa.me/201012459612?text=اقتراح بخصوص السبحة:" style="text-align:center; color:white; text-decoration:none;">
            <i class="fas fa-lightbulb" style="font-size:2rem; color:#ff9800;"></i><br><small>اقتراح</small>
        </a>
    </div>

    <script>
        const tasks = [
            { name: "الصلوات المحمدية", target: 3, intent: "اللهم إني نويت قراءة الورد - بسم الله الرحمن الرحيم" },
            { name: "الفواتح السبع", target: 7 },
            { name: "استغفر الله العظيم", target: 100 },
            { name: "لا إله إلا الله", target: 100 },
            { name: "الله", target: 100 },
            { name: "هو", target: 100 },
            { name: "حي", target: 100 },
            { name: "حق", target: 100 },
            { name: "قيوم", target: 100 },
            { name: "قهار", target: 100 },
            { name: "وهاب", target: 100 },
            { name: "اللهم صلِّ على سيدنا محمد", target: 100 },
            { name: "الصلوات المحمدية", target: 3 }
        ];

        let count = 0, mode = 'free', currentIdx = 0, freeTask = "سبحان الله", canTap = true;

        function handleGlobalTap(e) {
            if(!canTap || e.target.closest('.header') || e.target.closest('#contactModal') || e.target.closest('.controls-area')) return;
            count++;
            if (navigator.vibrate) navigator.vibrate(40);
            if(mode === 'word') {
                let t = tasks[currentIdx];
                updateProgress((Math.min(count, t.target) / t.target) * 816);
                if(count >= t.target) { canTap = false; setTimeout(() => { nextTask(); canTap = true; }, 600); }
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('mainCounter').innerText = count;
            const isWord = (mode === 'word');
            document.getElementById('taskTitle').innerText = isWord ? tasks[currentIdx].name : freeTask;
            document.getElementById('intent').innerText = isWord ? (tasks[currentIdx].intent || "") : "";
            document.getElementById('progressInfo').innerText = isWord ? `خطوة ${currentIdx + 1} | مطلوب: ${tasks[currentIdx].target}` : "";
            
            // التحكم في ظهور الأزرار
            document.getElementById('btnPrev').style.display = isWord ? 'flex' : 'none';
            document.getElementById('btnNext').style.display = isWord ? 'flex' : 'none';
            document.getElementById('btnRes').style.display = isWord ? 'flex' : 'none';
        }

        function setMode(m, e) { e.stopPropagation(); mode = m; count = 0; currentIdx = 0; 
            document.getElementById('freeMode').classList.toggle('active', m === 'free');
            document.getElementById('wordMode').classList.toggle('active', m === 'word');
            updateUI(); updateProgress(0);
        }

        function openMenu(e) { e.preventDefault(); e.stopPropagation(); document.getElementById('contactModal').classList.add('show'); document.getElementById('overlay').style.display = 'block'; }
        function closeMenu() { document.getElementById('contactModal').classList.remove('show'); document.getElementById('overlay').style.display = 'none'; }
        function nextTask() { if(currentIdx < tasks.length - 1) { currentIdx++; count = 0; updateProgress(0); updateUI(); } else { alert("تم الورد"); setMode('free', {stopPropagation:()=>{}}); } }
        function prevTask(e) { e.stopPropagation(); if(currentIdx > 0) { currentIdx--; count = 0; updateProgress(0); updateUI(); } }
        function skipTask(e) { e.stopPropagation(); nextTask(); }
        function decrement(e) { e.stopPropagation(); if(count > 0) count--; updateUI(); }
        function resetAll(e) { e.stopPropagation(); if(confirm("تصفير؟")) { count = 0; updateUI(); updateProgress(0); } }
        function updateProgress(offset) { document.getElementById('progressBar').style.strokeDashoffset = 816 - offset; }
        function handleTaskClick(e) { if(mode === 'free') { e.stopPropagation(); let n = prompt("تغيير الذكر:", freeTask); if(n) { freeTask = n; count = 0; updateUI(); } } }

        window.onload = updateUI;
    </script>
</body>
</html>
