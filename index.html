<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#161616">
    <title>السبحة المحمدية</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-green: #4CAF50; --bg-black: #0a0a0a; --card-dark: #161616; --accent-blue: #00d4ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 10px 15px; text-align: center; background: var(--card-dark); border-bottom: 1px solid #222; }
        .mode-selector { display: flex; gap: 8px; margin-top: 8px; justify-content: center; }
        .mode-btn { flex: 1; max-width: 150px; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #222; color: #888; font-weight: bold; font-size: 0.85rem; }
        .mode-btn.active { background: var(--main-green); color: white; border-color: var(--main-green); }

        /* منطقة التواصل الجديدة المنقولة */
        .contact-area-inline { display: flex; justify-content: center; gap: 20px; margin-top: 10px; padding: 5px; border-top: 1px solid #222; }
        .contact-item-inline { text-decoration: none; color: #555; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .contact-item-inline i { font-size: 1.1rem; color: var(--main-green); }
        .contact-item-inline.call i { color: var(--accent-blue); }
        .contact-item-inline.suggest i { color: #ff9800; }

        .main-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .intent-area { font-size: 0.85rem; color: var(--accent-blue); text-align: center; padding: 0 20px; min-height: 2.2rem; font-weight: bold; margin-bottom: 5px; }
        .current-task { font-size: 1.5rem; color: #ff9800; text-align: center; padding: 0 20px; min-height: 3.5rem; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }

        .counter-container { position: relative; width: 270px; height: 270px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .counter-number { font-size: 7rem; font-family: 'Consolas', monospace; color: var(--main-green); font-weight: bold; z-index: 2; }
        .progress-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .progress-svg circle { fill: none; stroke-width: 10; stroke: #1a1a1a; }
        .progress-svg circle.bar { stroke: var(--main-green); stroke-dasharray: 785; stroke-dashoffset: 785; transition: 0.3s; stroke-linecap: round; }

        .footer-info { font-size: 0.9rem; color: #444; font-weight: bold; margin-bottom: 15px; }

        /* منطقة الأزرار المخصصة */
        .controls-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; justify-items: center; align-items: center; padding: 0 10px; min-height: 60px; width: 100%; }
        .btn-circle { background: #1a1a1a; border: 1px solid #333; color: #888; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .btn-circle:active { background: #333; transform: scale(0.9); }
        .btn-reset { color: #8b2d26; } /* لون خافت للتصفير */
        .btn-minus { color: #8b7d26; } /* لون خافت للناقص */
        
        /* حالة العداد الحر: عمود واحد بزر الناقص فقط */
        .controls-grid.free-mode { grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .controls-grid.free-mode #btnPrev, .controls-grid.free-mode #btnNext { display: none; }
    </style>
</head>
<body onclick="handleGlobalTap(event)">

    <div class="header">
        <div style="font-weight: bold; color: var(--main-green); font-size: 1rem;">السبحة المحمدية</div>
        <div class="mode-selector">
            <button id="freeMode" class="mode-btn active" onclick="setMode('free', event)">عداد حر</button>
            <button id="wordMode" class="mode-btn" onclick="setMode('word', event)">الورد المحمدي</button>
        </div>
        
        <div class="contact-area-inline">
            <a href="https://wa.me/201012459612" class="contact-item-inline">
                <i class="fab fa-whatsapp"></i>
                <span>واتساب</span>
            </a>
            <a href="tel:01012459612" class="contact-item-inline call">
                <i class="fas fa-phone-alt"></i>
                <span>اتصال</span>
            </a>
            <a href="https://wa.me/201012459612?text=لدي اقتراح بخصوص السبحة:" class="contact-item-inline suggest">
                <i class="fas fa-lightbulb"></i>
                <span>اقتراحات</span>
            </a>
        </div>
    </div>

    <div class="main-display">
        <div id="intent" class="intent-area"></div>
        <div id="taskTitle" class="current-task" onclick="handleTaskClick(event)"></div>

        <div class="counter-container">
            <svg class="progress-svg">
                <circle cx="135" cy="135" r="125" />
                <circle id="progressBar" class="bar" cx="135" cy="135" r="125" />
            </svg>
            <div id="mainCounter" class="counter-number">0</div>
        </div>

        <div id="progressInfo" class="footer-info"></div>

        <div id="controlsGrid" class="controls-grid free-mode">
            <button id="btnPrev" class="btn-circle" onclick="prevTask(event)"><i class="fas fa-chevron-right"></i></button>
            <button id="btnReset" class="btn-circle btn-reset" onclick="resetAll(event)"><i class="fas fa-undo"></i></button>
            <button id="btnMinus" class="btn-circle btn-minus" onclick="decrement(event)"><i class="fas fa-minus"></i></button>
            <button id="btnNext" class="btn-circle" onclick="skipTask(event)"><i class="fas fa-chevron-left"></i></button>
        </div>
    </div>

    <script>
        const tasks = [
            { name: "الصلوات المحمدية", target: 3, intent: "اللهم إني نويت قراءة الورد - بسم الله الرحمن الرحيم" },
            { name: "الفواتح السبع", target: 7 },
            { name: "الصلوات المحمدية", target: 1 },
            { name: "استغفر الله العظيم هو التواب الرحيم", target: 100 },
            { name: "لا إله إلا الله", target: 100 },
            { name: "الله", target: 100 },
            { name: "هو", target: 100 },
            { name: "حي", target: 100 },
            { name: "حق", target: 100 },
            { name: "قيوم", target: 100 },
            { name: "قهار", target: 100 },
            { name: "وهاب", target: 100 },
            { name: "اللهم صلِّ على سيدنا محمد وعلى آله وصحبه وسلم", target: 100 },
            { name: "الصلوات المحمدية", target: 3 }
        ];

        let count = 0, mode = 'free', currentIdx = 0, freeTask = "اضغط لتخصيص الذكر", canTap = true;

        function handleGlobalTap(e) {
            if(!canTap) return;
            if(e.target.closest('.header') || e.target.closest('.controls-grid') || e.target.closest('.current-task')) return;
            
            count++;
            if (navigator.vibrate) navigator.vibrate(45); 
            
            if(mode === 'word') {
                let t = tasks[currentIdx];
                updateProgress((Math.min(count, t.target) / t.target) * 785);
                if(count >= t.target) {
                    canTap = false;
                    setTimeout(() => { nextTask(); canTap = true; }, 600);
                }
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('mainCounter').innerText = count;
            if(mode === 'word') {
                let t = tasks[currentIdx];
                document.getElementById('taskTitle').innerText = t.name;
                document.getElementById('intent').innerText = t.intent || "";
                document.getElementById('progressInfo').innerText = `خطوة ${currentIdx + 1} | مطلوب: ${t.target}`;
                // تفعيل الأزرار الكاملة
                document.getElementById('controlsGrid').classList.remove('free-mode');
            } else {
                document.getElementById('taskTitle').innerText = freeTask;
                document.getElementById('intent').innerText = "";
                document.getElementById('progressInfo').innerText = "";
                updateProgress(0);
                // تفعيل أزرار العداد الحر (الناقص والتصفير فقط)
                document.getElementById('controlsGrid').classList.add('free-mode');
            }
        }

        function setMode(m, e) {
            if(e) e.stopPropagation();
            mode = m; count = 0; currentIdx = 0; 
            document.getElementById('freeMode').classList.toggle('active', m === 'free');
            document.getElementById('wordMode').classList.toggle('active', m === 'word');
            updateUI();
        }

        function nextTask() {
            if(currentIdx < tasks.length - 1) { currentIdx++; count = 0; updateProgress(0); updateUI(); }
            else { alert("تم الورد بفضل الله"); setMode('free'); }
        }

        function prevTask(e) { e.stopPropagation(); if(currentIdx > 0) { currentIdx--; count = 0; updateProgress(0); updateUI(); } }
        function skipTask(e) { e.stopPropagation(); nextTask(); }
        function decrement(e) { e.stopPropagation(); if(count > 0) count--; updateUI(); }
        function resetAll(e) { e.stopPropagation(); if(confirm("تصفير العداد؟")) { count = 0; updateUI(); updateProgress(0); } }
        function handleTaskClick(e) { if(mode === 'free') { e.stopPropagation(); let n = prompt("الذكر:", freeTask); if(n) { freeTask = n; count = 0; updateUI(); } } }
        function updateProgress(offset) { document.getElementById('progressBar').style.strokeDashoffset = 785 - offset; }

        window.onload = updateUI;
    </script>
</body>
</html>
