<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#161616">
    <title>السبحة المحمدية</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-green: #4CAF50; --bg-black: #0a0a0a; --card-dark: #161616; --accent-blue: #00d4ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 12px 15px; text-align: center; background: var(--card-dark); border-bottom: 1px solid #222; }
        .mode-selector { display: flex; gap: 10px; margin-top: 10px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #222; color: #888; font-weight: bold; font-size: 0.9rem; }
        .mode-btn.active { background: var(--main-green); color: white; border-color: var(--main-green); }

        .main-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .intent-area { font-size: 0.9rem; color: var(--accent-blue); text-align: center; padding: 0 20px; min-height: 2.5rem; font-weight: bold; margin-bottom: 5px; }
        .current-task { font-size: 1.6rem; color: #ff9800; text-align: center; padding: 0 25px; min-height: 4rem; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; cursor: pointer; }

        .counter-container { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .counter-number { font-size: 7rem; font-family: 'Consolas', monospace; color: var(--main-green); font-weight: bold; z-index: 2; }
        .progress-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .progress-svg circle { fill: none; stroke-width: 10; stroke: #1a1a1a; }
        .progress-svg circle.bar { stroke: var(--main-green); stroke-dasharray: 816; stroke-dashoffset: 816; transition: 0.3s; stroke-linecap: round; }

        .footer-info { font-size: 0.95rem; color: #666; font-weight: bold; margin-bottom: 15px; }

        /* منطقة الأزرار المدمجة */
        .controls-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 0 20px; margin-bottom: 20px; }
        .btn-circle { background: #222; border: 1px solid #333; color: #bbb; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.2s; }
        .btn-circle:active { background: #333; transform: scale(0.9); }
        .btn-reset { color: #f44336; }
        .btn-minus { color: #ffeb3b; }

        /* قسم التواصل والدعم */
        .support-area { background: var(--card-dark); padding: 15px; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .support-link { color: #888; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.75rem; }
        .support-link i { font-size: 1.4rem; color: var(--main-green); }
        .support-link.call i { color: var(--accent-blue); }
        .support-link.suggest i { color: #ff9800; }

        #lockLayer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: none; }
    </style>
</head>
<body onclick="handleGlobalTap(event)">

    <div id="lockLayer"></div>

    <div class="header">
        <div style="font-weight: bold; color: var(--main-green);">السبحة المحمدية</div>
        <div class="mode-selector">
            <button id="freeMode" class="mode-btn active" onclick="setMode('free', event)">عداد حر</button>
            <button id="wordMode" class="mode-btn" onclick="setMode('word', event)">الورد المحمدي</button>
        </div>
    </div>

    <div class="main-display">
        <div id="intent" class="intent-area"></div>
        <div id="taskTitle" class="current-task" onclick="handleTaskClick(event)"></div>

        <div class="counter-container">
            <svg class="progress-svg">
                <circle cx="140" cy="140" r="130" />
                <circle id="progressBar" class="bar" cx="140" cy="140" r="130" />
            </svg>
            <div id="mainCounter" class="counter-number">0</div>
        </div>

        <div id="progressInfo" class="footer-info"></div>

        <div class="controls-grid">
            <button class="btn-circle btn-reset" onclick="resetAll(event)" title="تصفير"><i class="fas fa-undo"></i></button>
            <button class="btn-circle" onclick="prevTask(event)" title="السابق"><i class="fas fa-chevron-right"></i></button>
            <button class="btn-circle" onclick="skipTask(event)" title="التالي"><i class="fas fa-chevron-left"></i></button>
            <button class="btn-circle btn-minus" onclick="decrement(event)" title="نقص 1"><i class="fas fa-minus"></i></button>
        </div>
    </div>

    <div class="support-area">
        <a href="https://wa.me/201012459612" class="support-link">
            <i class="fab fa-whatsapp"></i>
            <span>واتساب</span>
        </a>
        <a href="tel:01012459612" class="support-link call">
            <i class="fas fa-phone-alt"></i>
            <span>اتصال</span>
        </a>
        <a href="https://wa.me/201012459612?text=لدي اقتراح بخصوص تطبيق السبحة:" class="support-link suggest">
            <i class="fas fa-lightbulb"></i>
            <span>اقتراحات</span>
        </a>
    </div>

    <script>
        const صلوات = "الصلوات المحمدية";
        const tasks = [
            { name: صلوات, target: 3, intent: "اللهم إني نويت قراءة الورد - بسم الله الرحمن الرحيم" },
            { name: "الفواتح السبع", target: 7 },
            { name: صلوات, target: 1 },
            { name: "استغفر الله العظيم هو التواب الرحيم", target: 100 },
            { name: صلوات, target: 1 },
            { name: "لا إله إلا الله", target: 100 },
            { name: صلوات, target: 1 },
            { name: "الله", target: 100 },
            { name: صلوات, target: 1 },
            { name: "هو", target: 100 },
            { name: صلوات, target: 1 },
            { name: "حي", target: 100 },
            { name: صلوات, target: 1 },
            { name: "حق", target: 100 },
            { name: صلوات, target: 1 },
            { name: "قيوم", target: 100 },
            { name: صلوات, target: 1 },
            { name: "قهار", target: 100 },
            { name: صلوات, target: 1 },
            { name: "وهاب", target: 100 },
            { name: صلوات, target: 1 },
            { name: "اللهم صلِّ على سيدنا محمد وعلى آله وصحبه وسلم", target: 100 },
            { name: صلوات, target: 3 },
            { name: "الفواتح السبع", target: 7 },
            { name: صلوات, target: 3 }
        ];

        let count = 0, mode = 'free', currentIdx = 0, freeTask = "اضغط لتخصيص الذكر", canTap = true;

        function handleGlobalTap(e) {
            if(!canTap) return;
            if(e.target.closest('.header') || e.target.closest('.support-area') || e.target.closest('.current-task') || e.target.closest('.controls-grid')) return;
            
            count++;
            if (navigator.vibrate) navigator.vibrate(45); 
            
            if(mode === 'word') {
                let t = tasks[currentIdx];
                updateProgress((Math.min(count, t.target) / t.target) * 816);
                if(count >= t.target) {
                    canTap = false;
                    setTimeout(() => { nextTask(); canTap = true; }, 600);
                }
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('mainCounter').innerText = count;
            if(mode === 'word') {
                let t = tasks[currentIdx];
                document.getElementById('taskTitle').innerText = t.name;
                document.getElementById('intent').innerText = t.intent || "";
                document.getElementById('progressInfo').innerText = `خطوة ${currentIdx + 1} من 25 | المطلوب: ${t.target}`;
            } else {
                document.getElementById('taskTitle').innerText = freeTask;
                document.getElementById('intent').innerText = "";
                document.getElementById('progressInfo').innerText = "";
                updateProgress(0);
            }
        }

        function setMode(m, e) {
            if(e) e.stopPropagation();
            mode = m; count = 0; currentIdx = 0; 
            document.getElementById('freeMode').classList.toggle('active', m === 'free');
            document.getElementById('wordMode').classList.toggle('active', m === 'word');
            updateUI(); updateProgress(0);
        }

        function nextTask() {
            if(currentIdx < tasks.length - 1) { currentIdx++; count = 0; updateProgress(0); updateUI(); }
            else { alert("تم الورد المحمدي بفضل الله"); setMode('free'); }
        }

        function prevTask(e) { e.stopPropagation(); if(currentIdx > 0) { currentIdx--; count = 0; updateProgress(0); updateUI(); } }
        function skipTask(e) { e.stopPropagation(); nextTask(); }
        function decrement(e) { e.stopPropagation(); if(count > 0) count--; updateUI(); }
        function resetAll(e) { e.stopPropagation(); if(confirm("تصفير العداد؟")) { count = 0; updateUI(); updateProgress(0); } }
        function handleTaskClick(e) { if(mode === 'free') { e.stopPropagation(); let n = prompt("اكتب الذكر:", freeTask); if(n) { freeTask = n; count = 0; updateUI(); } } }
        function updateProgress(offset) { document.getElementById('progressBar').style.strokeDashoffset = 816 - offset; }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(() => console.log('Offline Ready'));
        }
        window.onload = updateUI;
    </script>
</body>
</html>
