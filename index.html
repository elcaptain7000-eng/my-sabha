<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>السبحة المحمدية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-green: #4CAF50; --bg-black: #0a0a0a; --card-dark: #161616; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
        
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* الجزء العلوي: العنوان والمود */
        .header { padding: 10px 15px; text-align: center; background: var(--card-dark); z-index: 10; border-bottom: 1px solid #222; }
        .mode-selector { display: flex; gap: 8px; margin-top: 8px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #222; color: #888; font-weight: bold; font-size: 0.9rem; }
        .mode-btn.active { background: var(--main-green); color: white; border-color: var(--main-green); }

        /* منطقة العرض الرئيسية: تم تقليل المسافات لرفع الدائرة */
        .main-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; padding-top: 10px; }

        /* النية: تم تعديل النص وزيادة الوزن */
        .intent-area { font-size: 0.9rem; color: #00d4ff; text-align: center; padding: 0 15px; min-height: 2rem; font-weight: bold; margin-bottom: 5px; }
        
        /* الذكر: كبرت الخط وفصلته عن الدائرة */
        .current-task { 
            font-size: 1.5rem; color: #ff9800; text-align: center; padding: 0 20px; 
            min-height: 4rem; display: flex; align-items: center; justify-content: center;
            line-height: 1.3; z-index: 5; margin-bottom: 5px; cursor: pointer;
        }

        /* حاوية العداد والدائرة: تم تصغير الحجم قليلاً وتصغير الخط */
        .counter-container { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        
        .counter-number { font-size: 6rem; font-family: 'Consolas', monospace; color: var(--main-green); font-weight: bold; z-index: 2; }

        .progress-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .progress-svg circle { fill: none; stroke-width: 9; stroke: #1a1a1a; }
        .progress-svg circle.bar { stroke: var(--main-green); stroke-dasharray: 754; stroke-dashoffset: 754; transition: 0.3s; stroke-linecap: round; }

        /* معلومات التقدم: تم تصغيرها وفصلها */
        .footer-info { font-size: 0.9rem; color: #666; font-weight: bold; margin-bottom: 10px; min-height: 1.2rem;}

        /* أزرار التخطّي والسابق: تحت الدائرة مباشرة */
        .task-controls { display: flex; gap: 20px; margin-bottom: 15px; z-index: 10; }
        .control-btn { background: #222; border: 1px solid #333; color: #888; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .control-btn:active { background: #333; transform: scale(0.95); }

        /* منطقة التحكم السفلية: الناقص والتصفير */
        .bottom-nav { background: var(--card-dark); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222; }
        .nav-btn { background: #252525; border: 1px solid #333; color: white; width: 50px; height: 50px; border-radius: 12px; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        .nav-btn:active { background: #333; transform: scale(0.95); }
        .nav-btn.reset { color: #f44336; }
    </style>
</head>
<body onclick="handleGlobalTap(event)">

    <div class="header">
        <div style="font-weight: bold; font-size: 1rem; color: var(--main-green);">السبحة المحمدية</div>
        <div class="mode-selector">
            <button id="freeMode" class="mode-btn active" onclick="setMode('free', event)">عداد حر</button>
            <button id="wordMode" class="mode-btn" onclick="setMode('word', event)">الورد الكامل</button>
        </div>
    </div>

    <div class="main-display">
        <div id="intent" class="intent-area"></div>
        
        <div id="taskTitle" class="current-task" onclick="handleTaskClick(event)">اضغط هنا لتخصيص الذكر</div>

        <div class="counter-container">
            <svg class="progress-svg">
                <circle cx="130" cy="130" r="120" />
                <circle id="progressBar" class="bar" cx="130" cy="130" r="120" />
            </svg>
            <div id="mainCounter" class="counter-number">0</div>
        </div>

        <div id="progressInfo" class="footer-info"></div>

        <div id="taskControls" class="task-controls" style="visibility:hidden;">
            <button class="control-btn" onclick="prevTask(event)"><i class="fas fa-chevron-right"></i></button>
            <button class="control-btn" onclick="skipTask(event)"><i class="fas fa-chevron-left"></i></button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="decrement(event)"><i class="fas fa-minus"></i></button>
        <button class="nav-btn reset" onclick="resetAll(event)"><i class="fas fa-undo"></i></button>
    </div>

    <script>
        const صلوات = "الصلوات المحمدية";
        // تم تعديل نص النية في الذكر الأول
        const tasks = [
            { name: صلوات, target: 3, intent: "اللهم إني نويت قراءة الورد - بسم الله الرحمن الرحيم" },
            { name: "الفواتح السبع", target: 7 },
            { name: صلوات, target: 1 },
            { name: "استغفر الله العظيم هو التواب الرحيم", target: 100 },
            { name: صلوات, target: 1 },
            { name: "لا إله إلا الله", target: 100 },
            { name: صلوات, target: 1 },
            { name: "الله", target: 100 },
            { name: صلوات, target: 1 },
            { name: "هو", target: 100 },
            { name: صلوات, target: 1 },
            { name: "حي", target: 100 },
            { name: صلوات, target: 1 },
            { name: "حق", target: 100 },
            { name: صلوات, target: 1 },
            { name: "قيوم", target: 100 },
            { name: صلوات, target: 1 },
            { name: "قهار", target: 100 },
            { name: صلوات, target: 1 },
            { name: "وهاب", target: 100 },
            { name: صلوات, target: 1 },
            { name: "اللهم صلِّ على سيدنا محمد وعلى آله وصحبه وسلم", target: 100 },
            { name: صلوات, target: 3 },
            { name: "الفواتح السبع", target: 7 },
            { name: صلوات, target: 3 }
        ];

        let count = 0, mode = 'free', currentIdx = 0, freeTask = "اضغط هنا لتخصيص الذكر";

        function handleGlobalTap(e) {
            // منع التسبيح لو الضغطة على أي زرار أو منطقة نصية تفاعلية
            if(e.target.closest('.header') || e.target.closest('.bottom-nav') || e.target.closest('.current-task') || e.target.closest('.task-controls')) return;
            
            count++;
            if (navigator.vibrate) navigator.vibrate(45); 
            
            if(mode === 'word') {
                let t = tasks[currentIdx];
                updateProgress((Math.min(count, t.target) / t.target) * 754);
                if(count >= t.target) {
                    setTimeout(nextTask, 200);
                }
            }
            updateUI();
        }

        function handleTaskClick(e) {
            if(mode === 'free') {
                e.stopPropagation();
                let n = prompt("اكتب الذكر الذي تريده:", freeTask);
                if(n !== null && n.trim() !== "") {
                    freeTask = n;
                    count = 0;
                    updateUI();
                }
            }
        }

        function updateProgress(offset) {
            document.getElementById('progressBar').style.strokeDashoffset = 754 - offset;
        }

        function updateUI() {
            document.getElementById('mainCounter').innerText = count;
            const taskControls = document.getElementById('taskControls');

            if(mode === 'word') {
                let t = tasks[currentIdx];
                document.getElementById('taskTitle').innerText = t.name;
                document.getElementById('intent').innerText = t.intent || "";
                document.getElementById('progressInfo').innerText = `خطوة ${currentIdx + 1} من 25 | المطلوب: ${t.target}`;
                taskControls.style.visibility = 'visible';
            } else {
                document.getElementById('taskTitle').innerText = freeTask;
                document.getElementById('intent').innerText = "";
                // تم حذف نص "العداد الحر" من هنا ليكون التصميم أنقى
                document.getElementById('progressInfo').innerText = "";
                taskControls.style.visibility = 'hidden';
                updateProgress(0);
            }
        }

        function setMode(m, e) {
            if(e) e.stopPropagation();
            mode = m; count = 0; currentIdx = 0; 
            document.getElementById('freeMode').classList.toggle('active', m === 'free');
            document.getElementById('wordMode').classList.toggle('active', m === 'word');
            updateUI(); 
            updateProgress(0);
        }

        function nextTask() {
            if(currentIdx < tasks.length - 1) {
                currentIdx++; count = 0; updateProgress(0); updateUI();
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // اهتزاز مميز للنقل
            } else {
                alert("تم الورد بفضل الله");
                setMode('free');
            }
        }

        function prevTask(e) { e.stopPropagation(); if(currentIdx > 0) { currentIdx--; count = 0; updateProgress(0); updateUI(); } }
        function skipTask(e) { e.stopPropagation(); nextTask(); }
        function decrement(e) { e.stopPropagation(); if(count > 0) count--; updateUI(); }
        function resetAll(e) { e.stopPropagation(); if(confirm("هل تريد تصفير العداد؟")) { count = 0; updateUI(); updateProgress(0); } }

        window.onload = updateUI;
    </script>
</body>
</html>
