<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#161616">
    <title>السبحة المحمدية</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-green: #4CAF50; --bg-black: #0a0a0a; --card-dark: #161616; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
        body { background: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 12px 15px; text-align: center; background: var(--card-dark); border-bottom: 1px solid #222; }
        .mode-selector { display: flex; gap: 10px; margin-top: 10px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #222; color: #888; font-weight: bold; font-size: 0.95rem; }
        .mode-btn.active { background: var(--main-green); color: white; border-color: var(--main-green); }
        .main-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .intent-area { font-size: 0.95rem; color: #00d4ff; text-align: center; padding: 0 20px; min-height: 2.5rem; font-weight: bold; margin-bottom: 10px; line-height: 1.4; }
        .current-task { font-size: 1.75rem; color: #ff9800; text-align: center; padding: 0 25px; min-height: 4rem; display: flex; align-items: center; justify-content: center; z-index: 5; margin-bottom: 15px; cursor: pointer; }
        .counter-container { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .counter-number { font-size: 7rem; font-family: 'Consolas', monospace; color: var(--main-green); font-weight: bold; z-index: 2; }
        .progress-svg { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        .progress-svg circle { fill: none; stroke-width: 10; stroke: #1a1a1a; }
        .progress-svg circle.bar { stroke: var(--main-green); stroke-dasharray: 816; stroke-dashoffset: 816; transition: 0.2s; stroke-linecap: round; }
        .footer-info { font-size: 1rem; color: #666; font-weight: bold; margin-bottom: 15px; min-height: 1.5rem; }
        .task-controls { display: flex; gap: 40px; margin-bottom: 10px; }
        .control-btn { background: #222; border: 1px solid #444; color: #bbb; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .bottom-nav { background: var(--card-dark); padding: 18px; display: flex; justify-content: space-between; border-top: 1px solid #222; }
        .nav-btn { background: #252525; border: 1px solid #333; color: white; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .nav-btn.reset { color: #f44336; }
    </style>
</head>
<body onclick="handleGlobalTap(event)">

    <div class="header">
        <div style="font-weight: bold; color: var(--main-green);">السبحة المحمدية</div>
        <div class="mode-selector">
            <button id="freeMode" class="mode-btn active" onclick="setMode('free', event)">عداد حر</button>
            <button id="wordMode" class="mode-btn" onclick="setMode('word', event)">الورد المحمدي</button>
        </div>
    </div>

    <div class="main-display">
        <div id="intent" class="intent-area"></div>
        <div id="taskTitle" class="current-task" onclick="handleTaskClick(event)"></div>
        <div class="counter-container">
            <svg class="progress-svg">
                <circle cx="140" cy="140" r="130" />
                <circle id="progressBar" class="bar" cx="140" cy="140" r="130" />
            </svg>
            <div id="mainCounter" class="counter-number">0</div>
        </div>
        <div id="progressInfo" class="footer-info"></div>
        <div id="taskControls" class="task-controls" style="visibility:hidden;">
            <button class="control-btn" onclick="prevTask(event)"><i class="fas fa-chevron-right"></i></button>
            <button class="control-btn" onclick="skipTask(event)"><i class="fas fa-chevron-left"></i></button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="decrement(event)"><i class="fas fa-minus"></i></button>
        <button class="nav-btn reset" onclick="resetAll(event)"><i class="fas fa-undo"></i></button>
    </div>

    <script>
        const صلوات = "الصلوات المحمدية";
        const tasks = [
            { name: صلوات, target: 3, intent: "اللهم إني نويت قراءة الورد - بسم الله الرحمن الرحيم" },
            { name: "الفواتح السبع", target: 7 },
            { name: صلوات, target: 1 },
            { name: "استغفر الله العظيم هو التواب الرحيم", target: 100 },
            { name: صلوات, target: 1 },
            { name: "لا إله إلا الله", target: 100 },
            { name: صلوات, target: 1 },
            { name: "الله", target: 100 },
            { name: صلوات, target: 1 },
            { name: "هو", target: 100 },
            { name: صلوات, target: 1 },
            { name: "حي", target: 100 },
            { name: صلوات, target: 1 },
            { name: "حق", target: 100 },
            { name: صلوات, target: 1 },
            { name: "قيوم", target: 100 },
            { name: صلوات, target: 1 },
            { name: "قهار", target: 100 },
            { name: صلوات, target: 1 },
            { name: "وهاب", target: 100 },
            { name: صلوات, target: 1 },
            { name: "اللهم صلِّ على سيدنا محمد وعلى آله وصحبه وسلم", target: 100 },
            { name: صلوات, target: 3 },
            { name: "الفواتح السبع", target: 7 },
            { name: صلوات, target: 3 }
        ];

        let count = 0, mode = 'free', currentIdx = 0, freeTask = "اضغط لتخصيص الذكر";
        let canTap = true; // المتغير ده هو اللي هيتحكم في الأمان

        function handleGlobalTap(e) {
            // لو الأمان شغال (canTap = false)، اخرج وما تحسبش الضغطة
            if (!canTap) return;

            if(e.target.closest('.header') || e.target.closest('.bottom-nav') || e.target.closest('.current-task') || e.target.closest('.task-controls')) return;
            
            count++;
            if (navigator.vibrate) navigator.vibrate(45); 

            if(mode === 'word') {
                let t = tasks[currentIdx];
                updateProgress((Math.min(count, t.target) / t.target) * 816);
                
                if(count >= t.target) {
                    canTap = false; // اقفل اللمس فوراً
                    setTimeout(() => {
                        nextTask();
                        canTap = true; // افتح اللمس تاني بعد نص ثانية
                    }, 500); 
                }
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('mainCounter').innerText = count;
            const controls = document.getElementById('taskControls');
            if(mode === 'word') {
                let t = tasks[currentIdx];
                document.getElementById('taskTitle').innerText = t.name;
                document.getElementById('intent').innerText = t.intent || "";
                document.getElementById('progressInfo').innerText = `خطوة ${currentIdx + 1} من 25 | المطلوب: ${t.target}`;
                controls.style.visibility = 'visible';
            } else {
                document.getElementById('taskTitle').innerText = freeTask;
                document.getElementById('intent').innerText = "";
                document.getElementById('progressInfo').innerText = "";
                controls.style.visibility = 'hidden';
                updateProgress(0);
            }
        }

        function setMode(m, e) {
            if(e) e.stopPropagation();
            mode = m; count = 0; currentIdx = 0; 
            document.getElementById('freeMode').classList.toggle('active', m === 'free');
            document.getElementById('wordMode').classList.toggle('active', m === 'word');
            updateUI(); updateProgress(0);
        }

        function nextTask() {
            if(currentIdx < tasks.length - 1) { 
                currentIdx++; count = 0; updateProgress(0); updateUI(); 
            }
            else { alert("تم الورد المحمدي بفضل الله"); setMode('free'); }
        }

        function prevTask(e) { e.stopPropagation(); if(currentIdx > 0) { currentIdx--; count = 0; updateProgress(0); updateUI(); } }
        function skipTask(e) { e.stopPropagation(); nextTask(); }
        function decrement(e) { e.stopPropagation(); if(count > 0) count--; updateUI(); }
        function resetAll(e) { e.stopPropagation(); if(confirm("تصفير العداد؟")) { count = 0; updateUI(); updateProgress(0); } }
        function handleTaskClick(e) { if(mode === 'free') { e.stopPropagation(); let n = prompt("الذكر الجديد:", freeTask); if(n) { freeTask = n; count = 0; updateUI(); } } }
        function updateProgress(offset) { document.getElementById('progressBar').style.strokeDashoffset = 816 - offset; }
        window.onload = updateUI;
    </script>
</body>
</html>
