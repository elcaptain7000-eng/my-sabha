<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>من وصايا سيدنا الإمام - السبحة المحمدية</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --main-green: #4CAF50; --bg-black: #0a0a0a; --card-dark: #161616; }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-black); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* المنيو العلوي */
        .top-bar {
            display: flex;
            align-items: center;
            background: var(--card-dark);
            border-bottom: 1px solid #222;
            height: 65px;
            position: relative;
        }

        /* زر الرجوع بمساحة لمس واسعة */
        .back-btn { 
            cursor: pointer; 
            color: white; 
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%; 
            width: 60px;  
            position: absolute;
            right: 0;    
            z-index: 10;
        }

        .back-btn i {
            font-size: 1.4rem;
        }

        .app-title { 
            flex-grow: 1; 
            text-align: center; 
            font-weight: bold; 
            color: var(--main-green);
            font-size: 1.1rem;
            width: 100%;
        }

        /* حاوية المحتوى */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .icon-box {
            font-size: 5rem;
            color: var(--main-green);
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .status-text {
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .sub-text {
            color: var(--main-green);
            font-size: 1.2rem;
            line-height: 1.6;
            max-width: 85%;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-btn" onclick="window.location.href='index.html'; return false;">
            <i class="fas fa-arrow-right"></i>
        </a>
        <div class="app-title">من وصايا سيدنا الإمام</div>
    </div>

    <div class="content">
        <div class="icon-box">
            <i class="fas fa-scroll"></i>
        </div>
        
        <div class="status-text">
            جاري العمل
        </div>
        
        <div class="sub-text">
            داعين الله أن يتم الانتهاء في القريب العاجل
        </div>
    </div>

</body>
</html>
